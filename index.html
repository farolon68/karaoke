            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.9);
        }

        @keyframes movimientoFondo {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        h2 { 
            color: #ffffff; 
            margin: 0 0 10px 0; 
            font-size: 1.1rem; 
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px #ff9800;
            font-weight: bold;
        }

        .search-wrapper {

            gap: 10px; 
            width: 100%; 
            justify-content: center; 
            align-items: center;
            flex-wrap: wrap;
        }

        #buscador {
            flex: 2; 
            max-width: 500px; 
            padding: 10px 15px; 
            border-radius: 20px; 
            border: 2px solid #ff9800;
            background: rgba(0,0,0,0.8); 
            color: white; 
            font-size: 0.85rem; 
            outline: none;
            text-align: left;
        }

        .btn-refresh, .btn-yt, .btn-fav {
            border: none;
            border-radius: 20px;
            padding: 10px 15px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.3s;
        }

        .btn-refresh { background-color: #ff9800; color: black; }
        .btn-fav { background-color: #ffffff; color: black; }
        .btn-yt { background-color: #ff0000; color: white; text-decoration: none; }

        #buscador:focus, .btn-refresh:focus, .btn-yt:focus, .btn-fav:focus, .btn-wise:focus, .btn-star:focus {
            background-color: #ffffff !important;
            color: #000000 !important;
            transform: scale(1.05);
            box-shadow: 0 0 15px white;
            outline: none;
        }

        .grid-container {
            display: grid; 
            grid-template-columns: repeat(2, 1fr);
            gap: 15px; 
            padding: 20px;
            max-width: 1200px; 
            margin: 120px auto 0 auto; 
        }

        /* CONTENEDOR PARA EL BOTON Y LA ESTRELLA */
       .item-cancion { display: flex; align-items: center; background-color: #6a1b9a; border-radius: 15px; border: 1px solid #9c27b0; margin-bottom: 5px; overflow: hidden; }

        .btn-wise { 
            flex: 1; 
            color: white; 
            padding: 20px 35px; 
            font-size: 1.05rem; 
            text-decoration: none; 
            font-weight: bold; 
            display: block; 
            text-align: left; 
            transition: 0.3s; 
            border: none; 
            background: none; 
            /* Suma 1 al contador por cada botón */
            counter-increment: cancion-numero;
        }

        /* Inserta el número antes del texto */
        .btn-wise::before {
            content: counter(cancion-numero) ". ";
            margin-right: 10px;
            color: #ff9800; /* Naranja para que combine con tu estética */
        }

        .btn-star {
            background: none;
            border: none;
            color: #555;
            font-size: 1.5rem;
            padding: 0 15px;
            cursor: pointer;
        }

        .btn-star.es-fav { color: #ff9800; }

        @media (max-width: 600px) {

        let modoFavs = false;
        let favoritos = JSON.parse(localStorage.getItem('mis_favs')) || [];

        function cargarCanciones() {
    const contenedor = document.getElementById('contenedor');
    
    // 1. FILTRAR REPETIDAS: Nos quedamos solo con la primera vez que aparece cada título
    const cancionesLimpias = canciones.filter((valor, indice, self) =>
        indice === self.findIndex((t) => t.titulo === valor.titulo)
    );

    // 2. Filtramos si estamos en modo favoritos
    let listaAMostrar = modoFavs 
        ? cancionesLimpias.filter(c => favoritos.includes(c.titulo)) 
        : cancionesLimpias;

    // 3. Ordenamos alfabéticamente
    listaAMostrar.sort((a, b) => a.titulo.localeCompare(b.titulo));

    // 4. Pintamos en el HTML
    contenedor.innerHTML = listaAMostrar.map(c => {
        const claseFav = favoritos.includes(c.titulo) ? 'es-fav' : '';
        return `
        <div class="item-cancion nav-container">
            <a class="btn-wise nav" href="${c.url}">${c.titulo}</a>
            <button class="btn-star nav ${claseFav}" onclick="toggleFav('${c.titulo}', this)">★</button>
        </div>`;
    }).join('');
}


        function toggleFav(titulo, btn) {
            if (favoritos.includes(titulo)) {
                favoritos = favoritos.filter(f => f !== titulo);
                btn.classList.remove('es-fav');
            } else {
                favoritos.push(titulo);
                btn.classList.add('es-fav');
            }
            localStorage.setItem('mis_favs', JSON.stringify(favoritos));
        }

        function verFavoritos() {
            modoFavs = !modoFavs;
            const btn = document.getElementById('toggleFavs');
            btn.innerText = modoFavs ? "👁 VER TODO" : "⭐ FAVORITOS";
            btn.style.backgroundColor = modoFavs ? "#ffffff" : "#ffffff"; // Mantiene tu estilo original
            
            cargarCanciones();

            // ARREGLO FOCO TV: Forzamos el foco al mismo botón y NO al buscador
            setTimeout(() => {
                btn.focus();
            }, 100);
        }

        // --- SUSTITUYE TODA TU FUNCIÓN DE KEYDOWN POR ESTA ---
document.addEventListener('keydown', function(e) {
    const navItems = document.querySelectorAll('.nav');
    let current = document.activeElement;
    let items = Array.from(navItems).filter(i => i.offsetParent !== null); // Solo los visibles
    let index = items.indexOf(current);

    if (e.keyCode === 13) return; // Enter normal
    if (index === -1) return;

    let target = -1;
    const rectActual = current.getBoundingClientRect();

    if (e.keyCode === 39) { // DERECHA
        target = index + 1;
    } 
    else if (e.keyCode === 37) { // IZQUIERDA
        target = index - 1;
    } 
    else if (e.keyCode === 40) { // ABAJO (Busca el más cercano debajo)
        target = items.findIndex((item, i) => {
            const r = item.getBoundingClientRect();
            return i > index && r.top > rectActual.top + 10 && Math.abs(r.left - rectActual.left) < 50;
        });
        // Si no encuentra uno justo debajo, busca el primero de la siguiente fila
        if (target === -1) target = items.findIndex((item, i) => i > index && item.getBoundingClientRect().top > rectActual.top + 10);
    } 
    else if (e.keyCode === 38) { // ARRIBA (Busca el más cercano arriba)
        for (let i = index - 1; i >= 0; i--) {
            const r = items[i].getBoundingClientRect();
            if (r.top < rectActual.top - 10 && Math.abs(r.left - rectActual.left) < 50) {
                target = i;
                break;
            }
        }
        // Si no encuentra uno justo arriba, salta al primer elemento del header
        if (target === -1 && index >= 4) target = 0; 
    }

    if (items[target]) {
        items[target].focus();
        items[target].scrollIntoView({ behavior: 'smooth', block: 'center' });
        e.preventDefault();
    }
});


        function filtrar() {
    var input = document.getElementById('buscador');
    var valor = input.value.toLowerCase();
    
    // Función "Blindada" que limpia acentos usando códigos universales
    function limpiarTexto(t) {
        if (!t) return "";
        var s = t.toLowerCase();
        s = s.replace(/[áàäâ]/g, "a");
        s = s.replace(/[éèëê]/g, "e");
        s = s.replace(/[íìïî]/g, "i");
        s = s.replace(/[óòöô]/g, "o");
        s = s.replace(/[úùüû]/g, "u");
        return s;
    }

    var busqueda = limpiarTexto(valor);
    var canciones = document.getElementsByClassName('item-cancion');

    for (var i = 0; i < canciones.length; i++) {
        // Obtenemos el texto de la canción (el enlace + la estrella)
        var titulo = canciones[i].textContent || canciones[i].innerText || "";
        var tituloLimpio = limpiarTexto(titulo);

        // Si la búsqueda está vacía o el título contiene la búsqueda
        if (busqueda === "" || tituloLimpio.indexOf(busqueda) !== -1) {
            canciones[i].classList.remove('hidden');
        } else {
            canciones[i].classList.add('hidden');
        }
    }
}

        function resetear() {
            document.getElementById('buscador').value = "";
            modoFavs = false;
            document.getElementById('toggleFavs').innerText = "⭐ FAVORITOS";
            filtrar();
            cargarCanciones();
            document.getElementById('buscador').focus();
        }

        window.onload = () => {
            cargarCanciones();
            document.getElementById('buscador').focus();
        };
        function actualizarRelojYFecha() {
    const ahora = new Date();
    
    // Formato Fecha: DD/MM/AAAA
    const dia = String(ahora.getDate()).padStart(2, '0');
    const mes = String(ahora.getMonth() + 1).padStart(2, '0'); // Meses van de 1-12
    const anio = ahora.getFullYear();
    document.getElementById('fecha').innerText = `${dia}/${mes}/${anio}`;

    // Formato Hora: HH:MM
    const horas = String(ahora.getHours()).padStart(2, '0');
    const minutos = String(ahora.getMinutes()).padStart(2, '0');
    document.getElementById('reloj').innerText = `${horas}:${minutos}`;
}

// Ejecutar cada segundo
setInterval(actualizarRelojYFecha, 1000);
actualizarRelojYFecha(); // Ejecución inicial
    </script>
