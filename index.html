<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KARAOKE "EL LORA"</title>
    <style>
        body { 
            font-family: sans-serif; 
            background: linear-gradient(180deg, #000000 0%, #1a1100 70%, #332200 100%);
            background-attachment: fixed;
            color: white; 
            margin: 0; 
            padding: 0; 
            overflow-x: hidden;
        }

        .header-container { 
            position: fixed; 
            top: 15px; 
            left: 50%;
            transform: translateX(-50%); 
            width: 90%; 
            max-width: 600px; 
            background: linear-gradient(-45deg, #1a1a1a, #4d3300, #1a1a1a, #664400);
            background-size: 400% 400%;
            animation: movimientoFondo 12s ease infinite;
            padding: 15px; 
            z-index: 9999; 
            border: 2px solid #ff9800; 
            border-radius: 20px; 
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.9);
        }

        @keyframes movimientoFondo {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        h2 { 
            color: #ffffff; 
            margin: 0 0 10px 0; 
            font-size: 1.1rem; 
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px #ff9800;
            font-weight: bold;
        }

        .search-wrapper {
            display: flex;
            gap: 10px; 
            width: 100%; 
            justify-content: center; 
            align-items: center;
            flex-wrap: wrap;
        }

        #buscador {
            flex: 1 1 150px;
            max-width: 250px;
            padding: 10px 15px; 
            border-radius: 20px; 
            border: 2px solid #ff9800;
            background: rgba(0,0,0,0.8); 
            color: white; 
            font-size: 0.85rem; 
            outline: none;
            text-align: left;
        }

        .btn-refresh, .btn-yt {
            border: none;
            border-radius: 20px;
            padding: 10px 15px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.3s;
        }

        .btn-refresh { background-color: #ff9800; color: black; }
        .btn-yt { background-color: #ff0000; color: white; text-decoration: none; }

        #buscador:focus, .btn-refresh:focus, .btn-yt:focus, .btn-wise:focus {
            background-color: #ffffff !important;
            color: #000000 !important;
            transform: scale(1.05);
            box-shadow: 0 0 15px white;
        }

        .grid-container {
            display: grid; 
            grid-template-columns: repeat(3, 1fr);
            gap: 15px; 
            padding: 20px;
            max-width: 1200px; 
            margin: 120px auto 0 auto;
        }

        /* Contenedor relativo para la estrella */
        .cancion-card { position: relative; display: block; }

        .btn-wise {
            background-color: rgba(35, 35, 35, 0.9); 
            color: white; 
            padding: 20px 50px 20px 20px; 
            text-decoration: none;
            border-radius: 12px; 
            font-weight: bold; 
            border: 1px solid #444;
            display: block; 
            text-align: left;
            transition: 0.3s;
            scroll-margin-top: 200px;
        }

        /* Estilo de la Estrella */
        .fav-star {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.8rem;
            color: rgba(255,255,255,0.2);
            cursor: pointer;
            z-index: 10;
            transition: 0.3s;
            user-select: none;
        }

        .fav-star.active {
            color: #ffeb3b;
            text-shadow: 0 0 10px #ffeb3b;
        }

        .hidden { display: none !important; }

        @media (max-width: 600px) {
            .grid-container { grid-template-columns: 1fr; margin-top: 220px; }
            .header-container { width: 85%; }
            #buscador { width: 100%; max-width: none; }
        }
    </style>
</head>
<body>

        <div class="search-wrapper">

            <button class="btn-refresh nav" onclick="resetear()">REFRESCAR</button>

            { titulo: "Znombreautor", url: "link" },
]

        // Cargar favoritos del almacenamiento local
        let favoritos = JSON.parse(localStorage.getItem('favs_karaoke')) || [];

        function cargarCanciones() {
            const contenedor = document.getElementById('contenedor');
            
            // 1. Filtramos duplicados
            const listaUnica = Array.from(new Set(canciones.map(c => JSON.stringify(c))))
                .map(c => JSON.parse(c));

            // 2. Ordenamos alfabéticamente
            listaUnica.sort((a, b) => a.titulo.localeCompare(b.titulo));

            // 3. Pintamos en el HTML
            contenedor.innerHTML = listaUnica.map(c => {
                const esFav = favoritos.includes(c.titulo) ? 'active' : '';
                // Si es fav, lo mandamos arriba con order: -1
                const estiloFav = esFav ? 'style="order: -1; border: 1px solid #ffeb3b;"' : '';
                
                return `
                    <div class="cancion-card" ${estiloFav}>
                        <a class="btn-wise nav" tabindex="0" href="${c.url}">${c.titulo}</a>
                        <span class="fav-star ${esFav}" onclick="toggleFav(event, '${c.titulo}')">★</span>
                    </div>
                `;
            }).join('');
        }

        // Función para añadir/quitar de favoritos
        function toggleFav(event, titulo) {
            event.stopPropagation(); // Evita que se abra el link al dar a la estrella
            if (favoritos.includes(titulo)) {
                favoritos = favoritos.filter(f => f !== titulo);
            } else {
                favoritos.push(titulo);
            }
            localStorage.setItem('favs_karaoke', JSON.stringify(favoritos));
            cargarCanciones(); // Refrescar vista
        }

        document.addEventListener('keydown', function(e) {
            const navItems = document.querySelectorAll('.nav');
            let current = document.activeElement;
            let items = Array.from(navItems).filter(i => i.offsetParent !== null);
            let index = items.indexOf(current);

            if (e.keyCode === 13) { current.click(); return; }
            if (index === -1) return;

            let target = index;
            let grid = document.getElementById('contenedor');
            let cols = window.getComputedStyle(grid).getPropertyValue("grid-template-columns").split(" ").length;

            if (e.keyCode === 39) target = index + 1; 
            else if (e.keyCode === 37) target = index - 1; 
            else if (e.keyCode === 40) { 
                if (index < 3) target = 3; 
                else target = index + cols;
            }
            else if (e.keyCode === 38) { 
                if (index >= 3 && index < 3 + cols) target = 0;
                else if (index >= 3) target = index - cols;
            }

            if (items[target]) {
                items[target].focus();
                items[target].scrollIntoView({ behavior: 'smooth', block: 'center' });
                if (current.tagName !== "INPUT") e.preventDefault();
            }
        });

        function filtrar() {
            let q = document.getElementById('buscador').value.toUpperCase();
            let b = document.getElementsByClassName('cancion-card');
            for (let i = 0; i < b.length; i++) {
                let texto = b[i].innerText.toUpperCase();
                b[i].classList.toggle('hidden', texto.indexOf(q) === -1);
            }
        }

        function resetear() {
            document.getElementById('buscador').value = "";
            filtrar();
            document.getElementById('buscador').focus();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.onload = () => {
            cargarCanciones();
            document.getElementById('buscador').focus();
        };
    </script>
