<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CINE EL LORA TV</title>
    <style>
        body { 
            font-family: sans-serif; 
            background: linear-gradient(180deg, #000000 0%, #1a1100 70%, #332200 100%);
            background-attachment: fixed;
            color: white; 
            margin: 0; 
            padding: 0; 
            overflow-x: hidden;
        }

        .header-container { 
            position: sticky; 
            top: 0; 
            background: linear-gradient(-45deg, #1a1a1a, #4d3300, #1a1a1a, #664400);
            background-size: 400% 400%;
            animation: movimientoFondo 12s ease infinite;
            padding: 20px 15px; 
            z-index: 9999; 
            border-bottom: 2px solid #ff9800; 
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.8);
        }

        @keyframes movimientoFondo {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        h2 { 
            color: #ffffff; 
            margin: 0 0 15px 0; 
            font-size: 1.3rem; 
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 10px #ff9800, 0 0 20px #ff9800;
            font-weight: bold;
        }

        .search-wrapper {
            display: flex;
            gap: 40px; 
            width: 95%; 
            max-width: 900px; 
            justify-content: center; 
            align-items: center;
            flex-wrap: wrap;
        }

        #buscador {
            width: 220px; 
            padding: 12px 100px; 
            border-radius: 25px; 
            border: 2px solid #ff9800;
            background: rgba(0,0,0,0.7); 
            color: white; 
            font-size: 0.9rem; 
            outline: none;
            transition: 0.3s;
            text-align: left;
            padding-left: 25px;
        }

        .btn-refresh {
            background-color: #ff9800;
            color: black;
            border: 2px solid #000000;
            border-radius: 25px;
            padding: 13px 25px;
            font-weight: bold;
            cursor: pointer;
            white-space: nowrap;
            transition: 0.3s;
        }

        .btn-yt {
            background-color: #ff0000;
            color: black;
            border: 2px solid #000000;
            border-radius: 25px;
            padding: 12px 25px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            white-space: nowrap;
            transition: 0.3s;
        }

        #buscador:focus, .btn-refresh:focus, .btn-yt:focus, .btn-wise:focus {
            background-color: #ffffff !important;
            color: #000000 !important;
            border-color: #ffffff !important;
            transform: scale(1.08);
            outline: none !important;
            box-shadow: 0 0 20px rgba(255,255,255,0.6);
        }

        .grid-container {
            display: grid; 
            grid-template-columns: repeat(3, 1fr);
            gap: 15px; 
            padding: 25px;
            max-width: 1200px; 
            margin: 0 auto;
            /* Espacio para que la primera fila no empiece debajo del header */
            padding-top: 30px; 
        }

        .btn-wise {
            background-color: rgba(35, 35, 35, 0.9); 
            color: white; 
            padding: 20px; 
            text-decoration: none;
            border-radius: 12px; 
            font-weight: bold; 
            border: 1px solid #444;
            display: block; 
            text-align: left;
            transition: 0.3s;
            /* AJUSTE CLAVE: Evita que el botón se esconda al enfocar con mando */
            scroll-margin-top: 180px; 
        }

        .hidden { display: none !important; }

        @media (max-width: 600px) {
            .grid-container { grid-template-columns: 1fr; }
            #buscador { width: 90%; } 
            .search-wrapper { gap: 15px; flex-direction: column; }
            .btn-refresh, .btn-yt { width: 90%; text-align: center; }
            .btn-wise { scroll-margin-top: 250px; }
        }
    </style>
</head>
<body>

    <div class="header-container" id="miHeader">
        <h2>🇪🇸🇪🇸-🎤KARAOKE EL LORA🎤-🇪🇸🇪🇸</h2>
        <div class="search-wrapper">
            <input type="text" id="buscador" class="nav" placeholder="BUSCAR CANCION O ARTISTA..." onkeyup="filtrar()">
            <button class="btn-refresh nav" onclick="resetear()">REFRESCAR</button>
            <a class="btn-yt nav" href="https://www.youtube.com" target="_blank">YOUTUBE</a>
        </div>
    </div>

    <div class="grid-container" id="contenedor"></div>

    <script>
        const canciones = [
            { titulo: "NOCHES DE BOHEMIA-NAVAJITA PLATEA", url: "https://m.youtube.com/watch?v=0IzWvEM6WTk" },
            { titulo: "A QUIEN LE IMPORTA-ALASCA", url: "https://m.youtube.com/watch?v=jqCyfmpMmO8" },
            { titulo: "AMANTE BANDIDO-MIGUEL BOSE", url: "https://m.youtube.com/watch?v=3XOO6WmgOrM" },
            { titulo: "INSURRECCION-EL ULTIMO DE LA FILA", url: "https://m.youtube.com/watch?v=J4cejED1IvQ" },
            { titulo: "PAJAROS DE BARRO-MANOLO GARCIA", url: "https://m.youtube.com/watch?v=mDYyxJYwQ8I" },
            { titulo: "DEVUELVEME A MI CHICA-HOMBES G", url: "https://m.youtube.com/watch?v=LsWYt2vDBJA" },
            { titulo: "SOLDADITO MARINERO-FITO Y FITIPALDI", url: "https://m.youtube.com/watch?v=iOILOK_aDpQ" },
            { titulo: "UN RAMITO DE VIOLETAS-MANZANITA", url: "https://m.youtube.com/watch?v=j0TP9Gw_aew" },
            { titulo: "19 DIAS Y 500 NOCHES-SABINA", url: "https://m.youtube.com/watch?v=tP_qPszF214" },
            { titulo: "Y NOS DIERON LAS 10-SABINA", url: "https://m.youtube.com/watch?v=3ONdufafovg" },
            { titulo: "LA FLACA-JARABE DE PALO", url: "https://m.youtube.com/watch?v=Xkxkm_GV6Cg" },
            { titulo: "LA CAMISA NEGRA-JUANES", url: "https://m.youtube.com/watch?v=BimPHAx5-Vk" },
            { titulo: "SUPERESTRELLA-AITANA", url: "https://m.youtube.com/watch?v=JpcWs3xoFbY" },
            { titulo: "LA PERLA-ROSALIA", url: "https://m.youtube.com/watch?v=iOILOK_aDpQ" },
            { titulo: "TENIA TANTO QUE DARTE-NENA DACONTE", url: "https://m.youtube.com/watch?v=sHrnizfazKg" },
            { titulo: "CUANDO ZARPA EL AMOR-CAMELA", url: "https://m.youtube.com/watch?v=NGlRWhmQb7Q" },            
            { titulo: "COMO CAMARON-ESTOPA", url: "https://m.youtube.com/watch?v=8k0Vm-Z1l7I" },
            { titulo: "QUE LA DETENGAN-DAVID CIVERA", url: "https://m.youtube.com/watch?v=OPZ68H-8AAk" },
            { titulo: "YO QUIERO BAILAR-SONIA Y SELENA", url: "https://m.youtube.com/watch?v=Nc1YbpG0X6Y" },
            { titulo: "CUANDO TU VAS-CHENOA", url: "https://m.youtube.com/watch?v=WqTgMjFDNZc" },
            { titulo: "Y SI FUERA ELLA?-ALEJANDRO SANZ", url: "https://m.youtube.com/watch?t=13&v=a7HWFtn32bc" },
            { titulo: "BAILAR PEGADOS-SERGIO DALMA", url: "https://m.youtube.com/watch?v=R32tR0AnPq0" },
            { titulo: "Znombreautor", url: "link" },
            { titulo: "Znombreautor", url: "link" },
            { titulo: "Znombreautor", url: "link" },
        ];

        function cargarCanciones() {
            const contenedor = document.getElementById('contenedor');
            canciones.sort((a, b) => a.titulo.localeCompare(b.titulo));
            contenedor.innerHTML = canciones.map(c => 
                `<a class="btn-wise nav" tabindex="0" href="${c.url}">${c.titulo}</a>`
            ).join('');
        }

        document.addEventListener('keydown', function(e) {
            const navItems = document.querySelectorAll('.nav');
            let current = document.activeElement;
            let items = Array.from(navItems).filter(i => i.offsetParent !== null);
            let index = items.indexOf(current);

            if (e.keyCode === 13) { 
                current.click();
                return;
            }

            if (index === -1) { return; }

            let target = index;
            let grid = document.getElementById('contenedor');
            let cols = window.getComputedStyle(grid).getPropertyValue("grid-template-columns").split(" ").length;

            if (e.keyCode === 39) target = index + 1; 
            else if (e.keyCode === 37) target = index - 1; 
            else if (e.keyCode === 40) { // ABAJO
                if (index < 3) target = 3; 
                else target = index + cols;
            }
            else if (e.keyCode === 38) { // ARRIBA
                if (index >= 3 && index < 3 + cols) {
                    target = 0; // Salta al buscador desde la primera fila
                    window.scrollTo({ top: 0, behavior: 'smooth' }); // Asegura scroll arriba
                } else if (index >= 3) {
                    target = index - cols;
                }
            }

            if (items[target]) {
                items[target].focus();
                // Forzamos que el scroll siga al foco para Android TV
                items[target].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                if (current.tagName !== "INPUT") e.preventDefault();
            }
        });

        function filtrar() {
            let q = document.getElementById('buscador').value.toUpperCase();
            let b = document.getElementsByClassName('btn-wise');
            for (let i = 0; i < b.length; i++) {
                let texto = b[i].innerText.toUpperCase();
                b[i].classList.toggle('hidden', texto.indexOf(q) === -1);
            }
        }

        function resetear() {
            document.getElementById('buscador').value = "";
            filtrar();
            document.getElementById('buscador').focus();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.onload = () => {
            cargarCanciones();
            document.getElementById('buscador').focus();
        };
    </script>
</body>
</html>
